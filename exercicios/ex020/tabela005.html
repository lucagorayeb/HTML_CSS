<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            width: 500px;
        }

        .destaque{
            background-color: lime;
        }

        col.cnome,col.csexo{
            background-color: rgb(45, 45, 249);
        }

        th{
            border: 1px solid black;
            padding: 10px;
            background-color: gray;
            color: white;
        }

        td{
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>

    <table>

        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprofissão">
        </colgroup>

        <caption>Cadastro</caption>

        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade </th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>

        <tr>
            <td>Cláudio</td>
            <td>M</td>
            <td>28</td>
            <td>Padeiro</td>
        </tr>

        <tr class="destaque">
            <td>Larissa</td>
            <td>F</td>
            <td>28</td>
            <td>Médica</td>
        </tr>

        <tr>
            <td>Luca</td>
            <td>M</td>
            <td>20</td>
            <td>Programador fullstack</td>
        </tr>
    </table>
</body>
</html>
