<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
            iframe{
                width: 400px;
                height: 400px;
                border: 1px solid black;
            }
    </style>
</head>
<body>
    <!--O tamanho padrão é de 300x150px-->
    <h1>Testando o uso de iframes</h1>
    <p>Acessando o site do 
        
        <iframe src="https://www.cursoemvideo.com/" frameborder="0"
        height="500" scrolling="no">
            <a href="https://www.cursoemvideo.com/" target="_blank">Curso em vídeo</a>
        </iframe>
    
        para aprender a programar
    </p>

    
    <p>
        O site do 

        <iframe src="https://www.google.com.br/?hl=pt-BR" frameborder="0">

        </iframe>

        também é muito legal, pena qu não funciona dentro do iframe
    </p>

</body>
</html>
