<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em diferentes dispositivos ou simplesmente diminua ou aumente a tela.</p>

    <picture>
        <source media="(max-width:750px )" srcset="imagens/foto_P.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/foto_M.png" type="image/png">
        <img src="imagens/foto_G.png" alt="Foto Grande">
    </picture>

    <h1>Aúdio</h1>
    <p>Vsmos reproduzir um aúdio.</p>
   <audio preload="metadata" controls>
        <source src="midia/Cosmic Nightmares - Jimena Contreras.mp3" type="audio/mpeg">
   </audio>
</body>
</html>
