<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }

    div:hover{
        color: red;
        
    }

    div>p{
        display: none;
    }

    div:hover>p{
        display: block;
        background-color: red;
        color: white;
        width: 200px;
    }
</style>
<body>
    <h1>Exemplo de hover</h1>

    <p>Passe o mouse no texto abaixo!</p>

    <div>
        Passe o mouse aqui!

        <p>Texto escondido</p>
    </div>

    <p>Fim do Exemplo</p>
</body>
</html>
