<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras linhas</h1>

    <p>Você pode escrever um parágrafo de qualquer jeito desde que esteja entre as tags &ltp&gt e &ltp&gt!</p>

    <p>Lembre-se que você pode fazer quebras de linha usando &ltbr&gt! <br> Por exemplo essa daqui!</p>

    <p>Símbolos: <br> 
        &reg; <br> 
        &copy; <br>
        &uparrow; 
    </p>

    <p>Vamos colocar emojis: <br>
        &#x1F643 <br>
        &#x1F642 
    </p>
</body>
</html>
